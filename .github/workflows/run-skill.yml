name: Run Skill

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 min — checks aeon.yml to see if any skill is due
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill to run (e.g. article, digest)'
        required: true
        type: string
  workflow_call:
    inputs:
      skill:
        description: 'Skill to run'
        required: true
        type: string
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: aeon-main
  cancel-in-progress: false

jobs:
  run-skill:
    if: github.event_name != 'issues' || github.event.label.name == 'ai-build'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine skill
        id: skill
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "name=${{ inputs.skill }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            echo "name=feature" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            MINUTE=$(date -u +%-M)
            HOUR=$(date -u +%-H)
            DOM=$(date -u +%-d)
            MONTH=$(date -u +%-m)
            DOW=$(date -u +%w)

            # Cron field matcher: supports *, */N, N, and N,N,N
            cron_match() {
              local field="$1" value="$2"
              [ "$field" = "*" ] && return 0
              if [[ "$field" == */* ]]; then
                local interval="${field#*/}"
                [ $((value % interval)) -eq 0 ] && return 0
                return 1
              fi
              # Comma-separated list (e.g. 1,15 for 1st and 15th)
              IFS=',' read -ra VALS <<< "$field"
              for v in "${VALS[@]}"; do
                [ "$v" = "$value" ] && return 0
              done
              return 1
            }

            # Two-pass: first collect all skills with their enabled/schedule,
            # then match. This avoids field-ordering bugs in the YAML.
            declare -A SKILL_ENABLED SKILL_SCHEDULE
            SKILL_ORDER=()
            CURRENT_SKILL=""
            while IFS= read -r line; do
              if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+):\ *$ ]]; then
                CURRENT_SKILL="${BASH_REMATCH[1]}"
                SKILL_ORDER+=("$CURRENT_SKILL")
                SKILL_ENABLED["$CURRENT_SKILL"]="true"
                SKILL_SCHEDULE["$CURRENT_SKILL"]=""
              fi
              if [[ "$line" =~ ^\ \ \ \ enabled:\ *false ]] && [ -n "$CURRENT_SKILL" ]; then
                SKILL_ENABLED["$CURRENT_SKILL"]="false"
              fi
              if [[ "$line" =~ ^\ \ \ \ schedule:\ *\"([^\"]+)\" ]] && [ -n "$CURRENT_SKILL" ]; then
                SKILL_SCHEDULE["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
              fi
            done < aeon.yml

            # Now match in order
            for SKILL in "${SKILL_ORDER[@]}"; do
              [ "${SKILL_ENABLED[$SKILL]}" = "false" ] && continue
              SCHED="${SKILL_SCHEDULE[$SKILL]}"
              [ -z "$SCHED" ] && continue

              IFS=' ' read -r C_MIN C_HOUR C_DOM C_MONTH C_DOW <<< "$SCHED"
              cron_match "$C_MIN" "$MINUTE" || continue
              cron_match "$C_HOUR" "$HOUR" || continue
              cron_match "$C_DOM" "$DOM" || continue
              cron_match "$C_MONTH" "$MONTH" || continue
              cron_match "$C_DOW" "$DOW" || continue
              echo "name=$SKILL" >> "$GITHUB_OUTPUT"
              echo "Matched skill: $SKILL"
              break
            done
          fi

      - name: Setup Node.js
        if: steps.skill.outputs.name != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.skill.outputs.name != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Run skill
        if: steps.skill.outputs.name != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: |
          SKILL_NAME="${{ steps.skill.outputs.name }}"
          TODAY=$(date -u +%Y-%m-%d)
          ALLOWED="Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          ALLOWED="$ALLOWED,Bash(curl:*),Bash(gh:*),Bash(git:*),Bash(jq:*)"
          ALLOWED="$ALLOWED,Bash(bash tools/:*),Bash(./tools/:*)"
          ALLOWED="$ALLOWED,Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(chmod:*)"
          ALLOWED="$ALLOWED,Bash(date:*),Bash(echo:*),Bash(node:*),Bash(npm:*),Bash(npx:*)"
          ALLOWED="$ALLOWED,Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(grep:*)"
          claude -p "Today is $TODAY. Read and execute the skill defined in skills/${SKILL_NAME}.md" \
            --allowedTools "$ALLOWED"

      - name: Check for silent ack
        id: ack_check
        if: steps.skill.outputs.name != ''
        run: |
          # Check if Claude produced any file changes at all
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "suppressed=true" >> "$GITHUB_OUTPUT"
            echo "No file changes — skipping commit."
          fi

      - name: Commit results
        if: steps.skill.outputs.name != '' && steps.ack_check.outputs.suppressed != 'true'
        run: |
          git config user.email "aeon@github-actions"
          git config user.name "Aeon"
          SKILL_NAME="${{ steps.skill.outputs.name }}"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore($SKILL_NAME): auto-commit $(date +%Y-%m-%d)"
          # Retry push up to 3 times with rebase
          for i in 1 2 3; do
            git pull --rebase && git push -u origin HEAD && exit 0
            echo "Push attempt $i failed, retrying..."
          done
          echo "Failed to push after 3 attempts"
          exit 1
