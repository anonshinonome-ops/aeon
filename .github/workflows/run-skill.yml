name: Run Skill

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 min — checks aeon.yml to see if any skill is due
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill to run (e.g. article, digest)'
        required: true
        type: string
  workflow_call:
    inputs:
      skill:
        description: 'Skill to run'
        required: true
        type: string
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  run-skill:
    if: github.event_name != 'issues' || github.event.label.name == 'ai-build'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine skill
        id: skill
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "name=${{ inputs.skill }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            echo "name=feature" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            MINUTE=$(date -u +%-M)
            HOUR=$(date -u +%-H)
            DOW=$(date -u +%w)
            CURRENT_SKILL=""
            SKILL_ENABLED=true
            while IFS= read -r line; do
              if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+):\ *$ ]]; then
                CURRENT_SKILL="${BASH_REMATCH[1]}"
                SKILL_ENABLED=true
              fi
              if [[ "$line" =~ ^\ \ \ \ enabled:\ *false ]] && [ -n "$CURRENT_SKILL" ]; then
                SKILL_ENABLED=false
              fi
              if [[ "$line" =~ ^\ \ \ \ schedule:\ *\"([^\"]+)\" ]] && [ -n "$CURRENT_SKILL" ]; then
                if [ "$SKILL_ENABLED" = false ]; then
                  continue
                fi
                IFS=' ' read -r C_MIN C_HOUR C_DOM C_MONTH C_DOW <<< "${BASH_REMATCH[1]}"
                MATCH=true
                # Check minute: supports *, */N, or exact number
                if [ "$C_MIN" = "*" ]; then
                  :
                elif [[ "$C_MIN" == */* ]]; then
                  INTERVAL="${C_MIN#*/}"
                  [ $((MINUTE % INTERVAL)) -ne 0 ] && MATCH=false
                else
                  [ "$C_MIN" != "$MINUTE" ] && MATCH=false
                fi
                [ "$C_HOUR" != "*" ] && [ "$C_HOUR" != "$HOUR" ] && MATCH=false
                [ "$C_DOW" != "*" ] && [ "$C_DOW" != "$DOW" ] && MATCH=false
                if [ "$MATCH" = true ]; then
                  echo "name=$CURRENT_SKILL" >> "$GITHUB_OUTPUT"
                  echo "Matched skill: $CURRENT_SKILL"
                  break
                fi
              fi
            done < aeon.yml
          fi

      - name: Setup Node.js
        if: steps.skill.outputs.name != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.skill.outputs.name != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Run skill
        if: steps.skill.outputs.name != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: |
          SKILL_NAME="${{ steps.skill.outputs.name }}"
          TODAY=$(date -u +%Y-%m-%d)
          claude -p "Today is $TODAY. Read and execute the skill defined in skills/${SKILL_NAME}.md" --dangerously-skip-permissions

      - name: Check for silent ack
        if: contains(fromJSON('["heartbeat","github-monitor","on-chain-monitor","rss-digest","pr-review","issue-triage","dependency-check","wallet-digest","defi-monitor","token-alert","hacker-news-digest","tweet-digest","memory-flush","skill-health"]'), steps.skill.outputs.name)
        id: ack_check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          LOG_FILE="memory/logs/${TODAY}.md"
          if [ -f "$LOG_FILE" ]; then
            if tail -20 "$LOG_FILE" | grep -qE "_OK$"; then
              echo "suppressed=true" >> "$GITHUB_OUTPUT"
              echo "Nothing to report — skipping commit."
            fi
          fi

      - name: Commit results
        if: steps.skill.outputs.name != '' && steps.ack_check.outputs.suppressed != 'true'
        run: |
          git config user.email "aeon@github-actions"
          git config user.name "Aeon"
          SKILL_NAME="${{ steps.skill.outputs.name }}"
          git add -A
          git diff --staged --quiet || git commit -m "chore($SKILL_NAME): auto-commit $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push -u origin HEAD
